;
; PlatformIO Project Configuration File
; Crossover Digital 3 Vías con PCM5102
;

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Frecuencia de CPU
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Configuración de memoria - PARTICIÓN GRANDE
board_build.flash_mode = dio
board_build.partitions = huge_app.csv

; Monitor serial
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time

; Flags de compilación optimizados para reducir tamaño
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -ffast-math

; Librerías necesarias
lib_deps = 
    https://github.com/pschatzmann/ESP32-A2DP.git
    https://github.com/pschatzmann/arduino-audio-tools.git
; Configuración de subida
upload_speed = 921600
upload_port = COM3  ; Cambia según tu puerto

; Configuración avanzada
build_unflags = 
    -Os

; Habilitar excepciones para mejor debugging
build_type = debug